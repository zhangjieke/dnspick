name: Create Release and Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: ["linux", "windows", "darwin"]
        arch: ["amd64", "arm64"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build and Package
        id: build-and-package
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          BINARY_BASE_NAME="${PROJECT_NAME}-${GOOS}-${GOARCH}"
          BINARY_FINAL_NAME="${BINARY_BASE_NAME}"

          if [ "${GOOS}" = "windows" ]; then
            BINARY_FINAL_NAME+=".exe"
            ARCHIVE_NAME="${BINARY_BASE_NAME}.zip"
          else
            ARCHIVE_NAME="${BINARY_BASE_NAME}.tar.gz"
          fi

          PKG="github.com/${{ github.repository }}/internal/buildinfo"
          VERSION="${{ github.ref_name }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}" \
            -o "${BINARY_FINAL_NAME}" .

          if [ "${GOOS}" = "windows" ]; then
            7z a "${ARCHIVE_NAME}" "${BINARY_FINAL_NAME}"
          else
            tar -czvf "${ARCHIVE_NAME}" "${BINARY_FINAL_NAME}"
          fi

          echo "asset_path=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.build-and-package.outputs.asset_path }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    if: github.event_name == 'push'

    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*
